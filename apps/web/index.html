<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>TeleManager</title>
    <script>
      // Apply the saved theme + accent before first paint so there is no flash of
      // the wrong palette. Mirrors the defaults in theme-provider.tsx.
      (function () {
        try {
          var theme = localStorage.getItem("theme") || "dark";
          var resolved =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;
          document.documentElement.classList.add(resolved);
          var accent = localStorage.getItem("accent") || "teal";
          if (
            ["teal", "moonlight", "amber", "arctic", "emerald"].indexOf(accent) ===
            -1
          )
            accent = "teal";
          document.documentElement.setAttribute("data-accent", accent);
        } catch (e) {
          document.documentElement.classList.add("dark");
          document.documentElement.setAttribute("data-accent", "teal");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
