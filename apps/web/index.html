<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeleManager — local session ops</title>
    <meta
      name="description"
      content="Local-first manager for your own Telegram accounts: sessions, dialog discovery, guarded action queues, schedules, and a local audit log."
    />
    <!-- Browser chrome colour: warm-charcoal tile in dark, off-white in light. -->
    <meta name="theme-color" content="#211E1B" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAF8F4" media="(prefers-color-scheme: light)" />

    <!-- Icons / PWA (generated by scripts/gen-assets.mjs from the beacon mark). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Social / window preview. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TeleManager" />
    <meta
      property="og:description"
      content="Local-first manager for your own Telegram accounts."
    />
    <meta property="og:image" content="/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TeleManager" />
    <meta
      name="twitter:description"
      content="Local-first manager for your own Telegram accounts."
    />
    <meta name="twitter:image" content="/og.png" />
    <script>
      // Apply the saved theme + accent before first paint so there is no flash of
      // the wrong palette. Mirrors the defaults in theme-provider.tsx.
      (function () {
        try {
          var theme = localStorage.getItem("theme") || "dark";
          var resolved =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;
          document.documentElement.classList.add(resolved);
          var accent = localStorage.getItem("accent") || "teal";
          if (
            ["teal", "moonlight", "amber", "arctic", "emerald"].indexOf(accent) ===
            -1
          )
            accent = "teal";
          document.documentElement.setAttribute("data-accent", accent);
        } catch (e) {
          document.documentElement.classList.add("dark");
          document.documentElement.setAttribute("data-accent", "teal");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
