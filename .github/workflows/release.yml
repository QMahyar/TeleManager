name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
          - name: windows-arm64
            os: windows-11-arm
          - name: linux-amd64
            os: ubuntu-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: macos-amd64
            os: macos-13
          - name: macos-arm64
            os: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build package
        shell: bash
        run: python scripts/build-release.py --target ${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: telemanager-${{ matrix.name }}
          path: release/*

  termux:
    name: Build termux package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build package
        shell: bash
        run: python scripts/build-release.py --target termux-arm64 --termux

      - uses: actions/upload-artifact@v4
        with:
          name: telemanager-termux-arm64
          path: release/telemanager-termux-arm64.tar.gz

  release:
    name: Create GitHub release
    needs: [build, termux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
