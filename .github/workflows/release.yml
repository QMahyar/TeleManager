name: Release

on:
  push:
    tags:
      - "v*"
  # Manual runs build and upload artifacts for testing but do NOT publish a
  # GitHub release; the release job below only runs for tag pushes.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-sync:
    name: Verify single-source version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check pyproject version propagated to package.json + README
        shell: bash
        run: python scripts/sync_version.py --check

  test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Tests
        run: pytest -q

  frontend:
    name: Build frontend
    needs: [version-sync, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build frontend
        shell: bash
        run: |
          npm --prefix apps/web ci
          npm --prefix apps/web run build

      - uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: apps/web/dist

  build:
    name: Build ${{ matrix.name }}
    needs: frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
          - name: windows-arm64
            os: windows-11-arm
          - name: linux-amd64
            os: ubuntu-latest
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: macos-amd64
            os: macos-15-intel
          - name: macos-arm64
            os: macos-14

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Download prebuilt frontend
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: apps/web/dist

      - name: Build package
        shell: bash
        run: >-
          python scripts/build-release.py
          --target ${{ matrix.name }} --skip-frontend

      - uses: actions/upload-artifact@v5
        with:
          name: telemanager-${{ matrix.name }}
          path: release/*

  termux:
    name: Build termux package
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # No pip cache here: the termux package only stages source for on-device
      # install, so this job never runs pip and has nothing to cache.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download prebuilt frontend
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: apps/web/dist

      - name: Build package
        shell: bash
        run: >-
          python scripts/build-release.py
          --target termux-arm64 --termux --skip-frontend

      - uses: actions/upload-artifact@v5
        with:
          name: telemanager-termux-arm64
          path: release/telemanager-termux-arm64.tar.gz

  release:
    name: Create GitHub release
    needs: [build, termux]
    runs-on: ubuntu-latest
    # Tag-only: manual workflow_dispatch runs stop after building artifacts.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5

      - name: Extract CHANGELOG section for this tag
        id: changelog
        shell: python
        run: |
          import re
          from pathlib import Path
          tag = "${{ github.ref_name }}".removeprefix("v")  # v1.2.3 -> 1.2.3
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          # Capture from `## [VERSION]` up to the next `## [` or EOF.
          pattern = rf"## \[{re.escape(tag)}\].*?(?=\n## \[|\Z)"
          m = re.search(pattern, text, re.S)
          body = m.group(0).strip() if m else ""
          out = Path("release_notes.md")
          out.write_text(body, encoding="utf-8")
          print(f"Extracted {len(body)} chars for {tag}")

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: telemanager-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: TeleManager ${{ github.ref_name }}
          files: artifacts/*
          body_path: release_notes.md
          # Appends auto-generated commit/PR notes beneath the curated CHANGELOG
          # section. Empty file => auto notes stand alone.
          generate_release_notes: true
